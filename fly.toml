# fly.toml app configuration file generated for logistica-vdnseq on 2026-07-02T20:07:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'logistica-vdnseq'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_PATH = '/data/logistica.db'
  PORT = '3000'

[[mounts]]
  source = 'dados'
  destination = '/data'

[http_service]
  # A aplicação escuta na porta definida em PORT (3000) — precisa bater aqui
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
