<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Fretes</title>
  <style>
    :root {
      --fundo: #f4f5f7; --superficie: #ffffff; --borda: #e0e2e8;
      --texto: #1e2430; --texto-suave: #6a7181; --primaria: #1f5fbf; --perigo: #b3261e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: system-ui, -apple-system, sans-serif;
      background: var(--fundo); color: var(--texto);
    }
    header {
      background: var(--primaria); color: #fff;
      padding: 14px 16px; position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 17px; margin: 0; }
    main { max-width: 1100px; margin: 0 auto; padding: 16px; }
    section {
      background: var(--superficie); border: 1px solid var(--borda);
      border-radius: 10px; padding: 16px; margin-bottom: 16px;
    }
    h2 { font-size: 15px; margin: 0 0 14px; }

    /* ---- Modal de cadastro ---- */
    dialog {
      border: none; border-radius: 12px; padding: 0;
      width: min(760px, calc(100% - 24px));
      max-height: calc(100dvh - 32px);
    }
    dialog::backdrop { background: rgba(20, 25, 35, 0.55); }
    .modal-cabecalho {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 18px; border-bottom: 1px solid var(--borda);
      position: sticky; top: 0; background: var(--superficie); z-index: 1;
    }
    .modal-cabecalho h2 { margin: 0; }
    .fechar-modal {
      width: 38px; min-height: 38px; padding: 0; font-size: 16px;
      background: transparent; color: var(--texto-suave); border: none;
    }
    .modal-corpo { padding: 18px; }
    input[readonly] { background: #f0f2f5; color: var(--texto-suave); }
    .topo-lista { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .topo-lista h2 { margin: 0; }
    #botao-novo { width: auto; min-width: 150px; }
    #mensagem-global { font-size: 14px; color: #1a6b3c; min-height: 0; }
    #mensagem-global:not(:empty) { margin-bottom: 10px; }

    /* ---- Formulário: 1 coluna no celular, grade no desktop ---- */
    .grade { display: grid; grid-template-columns: 1fr; gap: 12px; }
    label { display: flex; flex-direction: column; gap: 4px; font-size: 13px; color: var(--texto-suave); font-weight: 600; }
    input, select, button {
      padding: 12px; border: 1px solid var(--borda); border-radius: 8px;
      font-size: 16px; font-family: inherit; background: var(--superficie);
      color: var(--texto); width: 100%; min-height: 46px;
    }
    button { background: var(--primaria); color: #fff; border: none; cursor: pointer; font-weight: 600; }
    button:active { filter: brightness(0.92); }
    button.secundario { background: transparent; color: var(--primaria); border: 1px solid var(--primaria); }
    .notas-area { margin-top: 12px; }
    .notas-area > label { margin-bottom: 6px; }
    .notas-linha { display: flex; flex-wrap: wrap; gap: 8px; }
    .campo-nota-grupo { display: flex; align-items: center; gap: 4px; }
    .campo-nota { width: 140px; }
    .tirar-nota { width: 34px; min-height: 34px; padding: 0; background: transparent; color: var(--perigo); border: none; font-size: 18px; }
    #add-nota { width: auto; }
    .acoes-form { margin-top: 14px; display: flex; flex-direction: column; gap: 10px; }
    #mensagem { font-size: 14px; min-height: 1em; }
    #mensagem.erro { color: var(--perigo); }
    #mensagem.ok { color: #1a6b3c; }

    /* ---- Filtros ---- */
    .filtros { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .filtros .largura-toda { grid-column: 1 / -1; }
    .resumo { font-size: 14px; color: var(--texto-suave); margin-bottom: 10px; }
    .resumo strong { color: var(--texto); }

    /* ---- Lista: cartões no celular ---- */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    thead { display: none; }
    tr.frete {
      display: block; border: 1px solid var(--borda); border-radius: 10px;
      padding: 12px; margin-bottom: 10px; background: var(--superficie);
    }
    td { display: flex; justify-content: space-between; gap: 10px; padding: 3px 0; border: none; }
    td::before { content: attr(data-rotulo); color: var(--texto-suave); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.03em; }
    td.sem-rotulo::before { content: none; }
    td.destaque { font-weight: 700; font-size: 15px; }
    td.celula-acoes { display: flex; gap: 8px; margin-top: 8px; padding-top: 10px; border-top: 1px solid var(--borda); }
    td.celula-acoes button { min-height: 40px; padding: 8px; }
    td.celula-acoes .excluir { background: transparent; color: var(--perigo); border: 1px solid var(--perigo); }
    .badge-nota {
      display: inline-block; background: #eef2fa; border: 1px solid #ccd8ef; color: #1f4e96;
      border-radius: 5px; padding: 2px 8px; font-size: 13px; margin: 1px 2px;
    }
    .badge-pendente {
      display: inline-block; background: #fdf1d8; border: 1px solid #ecd9a0; color: #7a5a00;
      border-radius: 5px; padding: 2px 8px; font-size: 12px; font-weight: 700; white-space: nowrap;
    }
    tr.frete.pendente { border-left: 4px solid #e3a008; }
    #filtro-pendentes { border-color: #e3a008; color: #7a5a00; background: transparent; font-weight: 700; }
    #filtro-pendentes.ativo { background: #e3a008; color: #fff; }
    td.celula-acoes .lancar { background: #e3a008; }
    .notas-celula { flex-wrap: wrap; justify-content: flex-end; text-align: right; }
    .vazio { color: var(--texto-suave); padding: 24px; text-align: center; display: block; }

    /* ---- Desktop (≥ 800px): formulário em grade e lista em tabela ---- */
    @media (min-width: 800px) {
      header h1 { font-size: 18px; }
      .grade { grid-template-columns: repeat(4, 1fr); }
      .acoes-form { flex-direction: row; align-items: center; }
      .acoes-form button { width: auto; min-width: 160px; }
      .filtros { grid-template-columns: 2fr 1fr 1fr auto auto; align-items: end; }
      .filtros .largura-toda { grid-column: auto; }
      input, select, button { font-size: 14px; padding: 9px 10px; min-height: 40px; }
      table { border: none; }
      thead { display: table-header-group; }
      thead th { text-align: left; padding: 8px 10px; color: var(--texto-suave); font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; border-bottom: 1px solid var(--borda); white-space: nowrap; }
      tr.frete { display: table-row; border: none; padding: 0; }
      td { display: table-cell; padding: 9px 10px; border-bottom: 1px solid var(--borda); white-space: nowrap; vertical-align: middle; }
      td::before { content: none; }
      td.celula-acoes { border-top: none; margin: 0; }
      td.celula-acoes button { min-height: 34px; padding: 5px 12px; font-size: 13px; width: auto; }
      .notas-celula { white-space: normal; text-align: left; justify-content: flex-start; }
      td.destaque { font-size: 14px; }
      .num { text-align: right; }
      .tabela-scroll { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <header>
    <h1>🚛 Controle de Fretes</h1>
  </header>
  <main>
    <dialog id="modal-frete">
      <div class="modal-cabecalho">
        <h2 id="titulo-form">Cadastrar frete</h2>
        <button type="button" class="fechar-modal" id="fechar-modal" aria-label="Fechar">✕</button>
      </div>
      <div class="modal-corpo">
      <form id="form-frete">
        <input type="hidden" name="id">
        <div class="grade">
          <label>Motorista*
            <input name="motorista" list="lista-motoristas" required autocomplete="off">
          </label>
          <label>Placa / CC
            <input name="placa_cc" list="lista-placas" autocomplete="off">
          </label>
          <label>Data*
            <input name="data" type="date" required>
          </label>
          <label>Origem*
            <input name="origem" list="lista-cidades" required autocomplete="off">
          </label>
          <label>Destino*
            <input name="destino" list="lista-cidades" required autocomplete="off">
          </label>
          <label>Peso (t)
            <input name="peso_ton" type="number" step="0.001" min="0" inputmode="decimal">
          </label>
          <label>Frete total (R$)
            <input name="frete_total" type="number" step="0.01" min="0" inputmode="decimal" placeholder="vazio = lançar depois">
          </label>
          <label>Valor (R$/t)
            <input name="valor_ton" type="number" step="0.01" min="0" inputmode="decimal" readonly placeholder="= total ÷ peso" title="Calculado automaticamente: frete total ÷ peso">
          </label>
        </div>
        <div class="notas-area">
          <label>Notas fiscais</label>
          <div class="notas-linha" id="notas-linha">
            <button type="button" class="secundario" id="add-nota">+ nota</button>
          </div>
        </div>
        <div class="acoes-form">
          <button type="submit" id="botao-salvar">Salvar frete</button>
          <button type="button" class="secundario" id="botao-cancelar">Cancelar</button>
          <span id="mensagem"></span>
        </div>
      </form>
      </div>
      <datalist id="lista-motoristas"></datalist>
      <datalist id="lista-placas"></datalist>
      <datalist id="lista-cidades"></datalist>
    </dialog>

    <section>
      <div class="topo-lista">
        <h2>Fretes cadastrados</h2>
        <button type="button" id="botao-novo">+ Novo frete</button>
      </div>
      <div id="mensagem-global"></div>
      <div class="filtros">
        <label class="largura-toda">Buscar por nota
          <input id="filtro-nota" placeholder="nº da nota" inputmode="numeric">
        </label>
        <label>Mês
          <input id="filtro-mes" type="month">
        </label>
        <label>Motorista
          <select id="filtro-motorista"><option value="">Todos</option></select>
        </label>
        <button type="button" id="filtro-pendentes" class="largura-toda">⚠ Sem valor lançado</button>
        <button type="button" class="secundario largura-toda" id="limpar-filtros">Limpar filtros</button>
      </div>
      <div class="resumo" id="resumo"></div>
      <div class="tabela-scroll">
        <table>
          <thead>
            <tr>
              <th>Data</th><th>Motorista</th><th>Placa / CC</th><th>Origem</th><th>Destino</th>
              <th>Notas</th><th class="num">Peso (t)</th><th class="num">R$/t</th>
              <th class="num">Frete total</th><th class="num">R$ / nota</th>
              <th>Registrado em</th><th></th>
            </tr>
          </thead>
          <tbody id="lista-fretes"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById('form-frete');
    const notasLinha = document.getElementById('notas-linha');
    const addNotaBtn = document.getElementById('add-nota');
    const fmtBRL = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });
    const fmtNum = new Intl.NumberFormat('pt-BR', { maximumFractionDigits: 3 });
    let fretesAtuais = [];
    let somentePendentes = false;
    const dinheiro = (v) => (v != null ? fmtBRL.format(v) : '—');

    async function api(caminho, opcoes) {
      const resp = await fetch(caminho, opcoes);
      const dados = resp.status === 204 ? null : await resp.json().catch(() => null);
      if (!resp.ok) throw new Error(dados?.erro || 'Erro na requisição');
      return dados;
    }

    function mostrarMensagem(texto, tipo) {
      const el = document.getElementById('mensagem');
      el.textContent = texto;
      el.className = tipo;
      if (tipo === 'ok') setTimeout(() => { el.textContent = ''; }, 5000);
    }

    function dataBR(iso) {
      const [a, m, d] = iso.split('-');
      return `${d}/${m}/${a.slice(2)}`;
    }

    function dataHoraBR(sql) {
      if (!sql) return '—';
      const d = new Date(sql.replace(' ', 'T') + 'Z');
      return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' }) +
        ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    // --- Modal ---
    const modal = document.getElementById('modal-frete');
    function abrirModal() { if (!modal.open) modal.showModal(); }
    function fecharModal() { modal.close(); }
    document.getElementById('fechar-modal').addEventListener('click', fecharModal);
    document.getElementById('botao-novo').addEventListener('click', () => {
      modoCadastro();
      abrirModal();
      form.motorista.focus();
    });
    modal.addEventListener('click', (ev) => {
      if (ev.target === modal) fecharModal();
    });

    // --- Valor (R$/t) calculado: frete total ÷ peso ---
    function recalcularValor() {
      const peso = parseFloat(form.peso_ton.value);
      const total = parseFloat(form.frete_total.value);
      form.valor_ton.value =
        peso > 0 && Number.isFinite(total) && total > 0 ? (total / peso).toFixed(2) : '';
    }
    form.peso_ton.addEventListener('input', recalcularValor);
    form.frete_total.addEventListener('input', recalcularValor);

    // --- Campos dinâmicos de nota ---
    function adicionarCampoNota(valor = '') {
      const grupo = document.createElement('span');
      grupo.className = 'campo-nota-grupo';
      const input = document.createElement('input');
      input.placeholder = 'nº da nota';
      input.className = 'campo-nota';
      input.inputMode = 'numeric';
      input.value = valor;
      const remover = document.createElement('button');
      remover.type = 'button';
      remover.className = 'tirar-nota';
      remover.textContent = '✕';
      remover.title = 'Remover nota';
      remover.addEventListener('click', () => grupo.remove());
      grupo.append(input, remover);
      notasLinha.insertBefore(grupo, addNotaBtn);
      if (!valor) input.focus();
      return input;
    }
    addNotaBtn.addEventListener('click', () => adicionarCampoNota());
    function lerNotas() {
      return [...notasLinha.querySelectorAll('.campo-nota')]
        .map((c) => c.value.trim())
        .filter((v) => v !== '');
    }
    function limparCamposNota() {
      notasLinha.querySelectorAll('.campo-nota-grupo').forEach((c) => c.remove());
    }

    // --- Formulário (cadastro e edição) ---
    function modoEdicao(frete) {
      form.id.value = frete.id;
      form.motorista.value = frete.motorista;
      form.placa_cc.value = frete.placa_cc ?? '';
      form.data.value = frete.data;
      form.origem.value = frete.origem;
      form.destino.value = frete.destino;
      form.peso_ton.value = frete.peso_ton ?? '';
      form.valor_ton.value = frete.valor_ton ?? '';
      form.frete_total.value = frete.frete_total ?? '';
      limparCamposNota();
      frete.notas.forEach((n) => adicionarCampoNota(n));
      const pendente = frete.pendente_valor;
      document.getElementById('titulo-form').textContent = pendente
        ? `Lançar valor do frete #${frete.id}`
        : `Editar frete #${frete.id}`;
      document.getElementById('botao-salvar').textContent = pendente ? 'Lançar valor' : 'Atualizar frete';
      document.getElementById('mensagem').textContent = '';
      abrirModal();
      if (pendente) form.frete_total.focus();
    }
    function modoCadastro() {
      form.reset();
      form.id.value = '';
      limparCamposNota();
      adicionarCampoNota();
      document.getElementById('titulo-form').textContent = 'Cadastrar frete';
      document.getElementById('botao-salvar').textContent = 'Salvar frete';
      document.getElementById('mensagem').textContent = '';
    }
    document.getElementById('botao-cancelar').addEventListener('click', fecharModal);

    form.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const dados = {
        motorista: form.motorista.value,
        placa_cc: form.placa_cc.value || null,
        data: form.data.value,
        origem: form.origem.value,
        destino: form.destino.value,
        peso_ton: form.peso_ton.value || null,
        valor_ton: form.valor_ton.value,
        frete_total: form.frete_total.value || null,
        notas: lerNotas(),
      };
      const id = form.id.value;
      try {
        const salvo = await api(id ? `/api/fretes/${id}` : '/api/fretes', {
          method: id ? 'PUT' : 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(dados),
        });
        fecharModal();
        const global = document.getElementById('mensagem-global');
        global.textContent = salvo.pendente_valor
          ? `Frete de ${dataBR(salvo.data)} ${id ? 'atualizado' : 'cadastrado'} — valor pendente de lançamento.`
          : `Frete de ${dataBR(salvo.data)} ${id ? 'atualizado' : 'cadastrado'} — total ${dinheiro(salvo.frete_total)}.`;
        setTimeout(() => { global.textContent = ''; }, 6000);
        modoCadastro();
        await Promise.all([carregarFretes(), carregarOpcoes()]);
      } catch (erro) {
        mostrarMensagem(erro.message, 'erro');
      }
    });

    // --- Listagem, filtros e resumo ---
    async function carregarOpcoes() {
      const opcoes = await api('/api/opcoes');
      const preencher = (id, valores) => {
        document.getElementById(id).innerHTML = valores
          .map((v) => `<option value="${v}"></option>`).join('');
      };
      preencher('lista-motoristas', opcoes.motoristas);
      preencher('lista-placas', opcoes.placas);
      preencher('lista-cidades', opcoes.cidades);
      const botaoPendentes = document.getElementById('filtro-pendentes');
      botaoPendentes.textContent = opcoes.fretes_pendentes > 0
        ? `⚠ Sem valor lançado (${opcoes.fretes_pendentes})`
        : '⚠ Sem valor lançado';
      const selecao = document.getElementById('filtro-motorista');
      const atual = selecao.value;
      selecao.innerHTML = '<option value="">Todos</option>' + opcoes.motoristas
        .map((m) => `<option value="${m}">${m}</option>`).join('');
      selecao.value = atual;
    }

    async function carregarFretes() {
      const parametros = new URLSearchParams();
      const nota = document.getElementById('filtro-nota').value.trim();
      const mes = document.getElementById('filtro-mes').value;
      const motorista = document.getElementById('filtro-motorista').value;
      if (nota) parametros.set('nota', nota);
      if (mes) parametros.set('mes', mes);
      if (motorista) parametros.set('motorista', motorista);
      if (somentePendentes) parametros.set('pendentes', '1');

      fretesAtuais = await api('/api/fretes?' + parametros.toString());
      const corpo = document.getElementById('lista-fretes');
      const soma = fretesAtuais.reduce((total, f) => total + (f.frete_total ?? 0), 0);
      const pendentesNoFiltro = fretesAtuais.filter((f) => f.pendente_valor).length;
      document.getElementById('resumo').innerHTML =
        `<strong>${fretesAtuais.length}</strong> frete(s) — total <strong>${fmtBRL.format(soma)}</strong>` +
        (pendentesNoFiltro > 0 ? ` — <strong style="color:#7a5a00">${pendentesNoFiltro} sem valor</strong>` : '');

      if (fretesAtuais.length === 0) {
        corpo.innerHTML = '<tr><td colspan="12" class="vazio sem-rotulo">Nenhum frete encontrado</td></tr>';
        return;
      }
      corpo.innerHTML = fretesAtuais.map((f) => `
        <tr class="frete${f.pendente_valor ? ' pendente' : ''}">
          <td data-rotulo="Data">${dataBR(f.data)}</td>
          <td data-rotulo="Motorista">${f.motorista}</td>
          <td data-rotulo="Placa / CC">${f.placa_cc ?? '—'}</td>
          <td data-rotulo="Origem">${f.origem}</td>
          <td data-rotulo="Destino">${f.destino}</td>
          <td data-rotulo="Notas" class="notas-celula">${f.notas.length ? f.notas.map((n) => `<span class="badge-nota">${n}</span>`).join('') : '—'}</td>
          <td data-rotulo="Peso (t)" class="num">${f.peso_ton != null ? fmtNum.format(f.peso_ton) : '—'}</td>
          <td data-rotulo="R$/t" class="num">${dinheiro(f.valor_ton)}</td>
          <td data-rotulo="Frete total" class="num destaque">${f.pendente_valor ? '<span class="badge-pendente">SEM VALOR</span>' : dinheiro(f.frete_total)}</td>
          <td data-rotulo="R$ / nota" class="num">${dinheiro(f.valor_por_nota)}</td>
          <td data-rotulo="Registrado em">${dataHoraBR(f.criado_em)}</td>
          <td class="celula-acoes sem-rotulo">
            <button type="button" class="${f.pendente_valor ? 'lancar' : 'secundario'}" data-editar="${f.id}">${f.pendente_valor ? 'Lançar valor' : 'Editar'}</button>
            <button type="button" class="excluir" data-excluir="${f.id}">Excluir</button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('lista-fretes').addEventListener('click', async (ev) => {
      const editar = ev.target.closest('button[data-editar]');
      if (editar) {
        const frete = fretesAtuais.find((f) => f.id === Number(editar.dataset.editar));
        if (frete) modoEdicao(frete);
        return;
      }
      const excluir = ev.target.closest('button[data-excluir]');
      if (excluir && confirm('Excluir este frete e suas notas?')) {
        try {
          await api(`/api/fretes/${excluir.dataset.excluir}`, { method: 'DELETE' });
          carregarFretes();
        } catch (erro) {
          alert(erro.message);
        }
      }
    });

    let temporizador;
    document.getElementById('filtro-nota').addEventListener('input', () => {
      clearTimeout(temporizador);
      temporizador = setTimeout(carregarFretes, 300);
    });
    document.getElementById('filtro-mes').addEventListener('change', carregarFretes);
    document.getElementById('filtro-motorista').addEventListener('change', carregarFretes);
    document.getElementById('filtro-pendentes').addEventListener('click', (ev) => {
      somentePendentes = !somentePendentes;
      ev.currentTarget.classList.toggle('ativo', somentePendentes);
      carregarFretes();
    });
    document.getElementById('limpar-filtros').addEventListener('click', () => {
      document.getElementById('filtro-nota').value = '';
      document.getElementById('filtro-mes').value = '';
      document.getElementById('filtro-motorista').value = '';
      somentePendentes = false;
      document.getElementById('filtro-pendentes').classList.remove('ativo');
      carregarFretes();
    });

    modoCadastro();
    carregarOpcoes().catch(() => {});
    carregarFretes().catch(() => mostrarMensagem('Erro ao carregar fretes', 'erro'));
  </script>
</body>
</html>
